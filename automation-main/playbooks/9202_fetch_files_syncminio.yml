---
- name: Fetch selected files from managed hosts
  hosts: env_lab
  gather_facts: false

  vars:
    control_run_dir: "{{ control_artifacts_root }}/fetched_files/{{ hostvars['localhost']['fetch_run_id'] }}/{{ inventory_hostname }}"
    control_files_dir: "{{ control_run_dir }}/files"

    files_to_fetch:
      - /tmp/malware.sh
      - /home/kepco/malware.sh
      - /var/tmp/dropper.bin
      - /opt/badtool/evil.py

  pre_tasks:
    - name: Generate a single run timestamp on control node
      ansible.builtin.set_fact:
        fetch_run_id: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: true
      become: false

    - name: Verify mc is available on control node
      ansible.builtin.command:
        cmd: mc --version
      register: mc_version_check
      changed_when: false
      run_once: true
      delegate_to: localhost
      become: false

    - name: Verify MinIO bucket is reachable via configured alias
      ansible.builtin.command:
        cmd: mc ls "{{ minio_alias }}/{{ minio_bucket }}"
      register: minio_bucket_check
      changed_when: false
      run_once: true
      delegate_to: localhost
      become: false

  tasks:
    - name: Assert file list is defined
      ansible.builtin.assert:
        that:
          - files_to_fetch is defined
          - files_to_fetch | length > 0
        fail_msg: "files_to_fetch is not defined or empty"

    - name: Check whether target files exist
      ansible.builtin.stat:
        path: "{{ item }}"
        get_checksum: true
      loop: "{{ files_to_fetch }}"
      register: file_stat_results
      become: true

    - name: Ensure local artifact root exists
      ansible.builtin.file:
        path: "{{ control_run_dir }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Ensure local files root exists
      ansible.builtin.file:
        path: "{{ control_files_dir }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Ensure parent directories exist for fetched files
      ansible.builtin.file:
        path: "{{ control_files_dir }}{{ item.item | dirname }}"
        state: directory
        mode: "0750"
      loop: "{{ file_stat_results.results }}"
      when:
        - item.stat.exists | default(false)
        - not (item.stat.isdir | default(false))
      delegate_to: localhost
      become: false

    - name: Fetch existing files to control node preserving original path structure
      ansible.builtin.fetch:
        src: "{{ item.item }}"
        dest: "{{ control_files_dir }}{{ item.item }}"
        flat: true
      loop: "{{ file_stat_results.results }}"
      when:
        - item.stat.exists | default(false)
        - not (item.stat.isdir | default(false))
      become: true

    - name: Write manifest on control node
      ansible.builtin.copy:
        dest: "{{ control_run_dir }}/manifest.txt"
        mode: "0640"
        content: |
          inventory_hostname={{ inventory_hostname }}
          fetch_run_id={{ hostvars['localhost']['fetch_run_id'] }}

          {% for item in file_stat_results.results %}
          path={{ item.item }}
          local_path={{ control_files_dir }}{{ item.item }}
          exists={{ item.stat.exists | default(false) }}
          isdir={{ item.stat.isdir | default(false) }}
          size={{ item.stat.size | default('n/a') }}
          checksum={{ item.stat.checksum | default('n/a') }}

          {% endfor %}
      delegate_to: localhost
      become: false

    - name: Show fetch summary
      ansible.builtin.debug:
        msg:
          - "Fetched files for {{ inventory_hostname }}"
          - "Saved under {{ control_run_dir }}"

  post_tasks:
    - name: Mirror local artifacts tree to MinIO
      ansible.builtin.command:
        cmd: >
          mc mirror --overwrite
          "{{ control_artifacts_root }}/"
          "{{ minio_target }}/"
      register: minio_mirror_result
      changed_when: true
      run_once: true
      delegate_to: localhost
      become: false

    - name: Show MinIO mirror result
      ansible.builtin.debug:
        var: minio_mirror_result.stdout_lines
      run_once: true