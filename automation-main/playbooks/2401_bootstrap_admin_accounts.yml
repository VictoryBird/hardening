---
- name: Create admin users only if absent
  hosts: env_lab
  gather_facts: false
  become: true

  vars:
    effective_sudo_group: "{{ os_sudo_group | default('sudo') }}"
    effective_shell: /bin/bash

    bootstrap_admins:
    - bt14admin01
    - bt14admin02

  tasks:
    - name: Assert bootstrap user list is defined
      ansible.builtin.assert:
        that:
          - bootstrap_admins is defined
          - bootstrap_admins | length > 0
        fail_msg: "bootstrap_admins is not defined or empty"

    - name: Assert controller public key path is defined
      ansible.builtin.assert:
        that:
          - controller_public_key_path is defined
          - controller_public_key_path | length > 0
        fail_msg: "controller_public_key_path is not defined"

    - name: Check whether each target user already exists
      ansible.builtin.command:
        cmd: "getent passwd {{ item }}"
      loop: "{{ bootstrap_admins }}"
      register: bootstrap_user_lookup
      changed_when: false
      failed_when: false

    - name: Build list of users to create
      ansible.builtin.set_fact:
        users_to_create: >-
          {{
            bootstrap_user_lookup.results
            | selectattr('rc', 'ne', 0)
            | map(attribute='item')
            | list
          }}

    - name: Show users that will be created
      ansible.builtin.debug:
        msg: "Users to create on {{ inventory_hostname }}: {{ users_to_create | join(', ') if users_to_create | length > 0 else 'none' }}"

    - name: Ensure admin users are created
      ansible.builtin.user:
        name: "{{ item }}"
        state: present
        create_home: true
        shell: "{{ effective_shell }}"
        groups: "{{ effective_sudo_group }}"
        append: true
        password: "{{ ansible_password | password_hash('sha512') }}"
        update_password: on_create
      loop: "{{ users_to_create }}"
      no_log: true      

    - name: Install controller public key for created users
      ansible.posix.authorized_key:
        user: "{{ item }}"
        state: present
        key: "{{ lookup('file', controller_public_key_path) }}"
        manage_dir: true
      loop: "{{ users_to_create }}"

    - name: Show users skipped because they already exist
      ansible.builtin.debug:
        msg: "User {{ item.item }} already exists on {{ inventory_hostname }}, skipping creation"
      loop: "{{ bootstrap_user_lookup.results }}"
      when: item.rc == 0