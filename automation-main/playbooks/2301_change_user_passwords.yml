---
- name: Change user passwords from plaintext input
  hosts: env_lab
  gather_facts: false
  become: true

  vars:
    debug_sensitive: true

    # 대상 사용자
    target_users:
      - alice
      - bob
      - carol
      - kepco
      - bt14admin01
      - bt14admin02

    # 평문 비밀번호
    user_plain_passwords:
      alice: "kepco"
      bob: "kepco"
      carol: "kepco"
      kepco: "kepco"
      bt14admin01: "kepco"
      bt14admin02: "kepco"

    # 공통 비밀번호
    # common_password: "kepco"

  tasks:
    - name: Assert target user list is defined
      ansible.builtin.assert:
        that:
          - target_users is defined
          - target_users | length > 0
        fail_msg: "target_users is not defined or empty"

    - name: Assert plaintext password mapping is defined
      ansible.builtin.assert:
        that:
          - user_plain_passwords is defined
          # - common_password is defined
        fail_msg: "user_plain_passwords or common_password is not defined"

    - name: Check whether each target user exists
      ansible.builtin.command:
        cmd: "getent passwd {{ item }}"
      loop: "{{ target_users }}"
      register: passwd_lookup_results
      changed_when: false
      failed_when: false

    - name: Change password for existing users (plaintext → hash)
      ansible.builtin.user:
        name: "{{ item.item }}"
        password: "{{ user_plain_passwords[item.item] | password_hash('sha512') }}"
        # password: "{{ common_password | password_hash('sha512') }}"
        update_password: always
      loop: "{{ passwd_lookup_results.results }}"
      when:
        - item.rc == 0
        - item.item in user_plain_passwords
      no_log: "{{ not debug_sensitive }}"

    - name: Show skipped users (not existing)
      ansible.builtin.debug:
        msg: "User {{ item.item }} does not exist on {{ inventory_hostname }}, skipping"
      loop: "{{ passwd_lookup_results.results }}"
      when: item.rc != 0

    - name: Show skipped users (no password defined)
      ansible.builtin.debug:
        msg: "User {{ item.item }} exists but no plaintext password defined, skipping"
      loop: "{{ passwd_lookup_results.results }}"
      when:
        - item.rc == 0
        - item.item not in user_plain_passwords