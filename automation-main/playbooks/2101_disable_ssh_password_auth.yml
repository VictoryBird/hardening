---
- name: Disable SSH password authentication only after key login is verified
  hosts: env_lab
  gather_facts: false
  become: true

  vars:
    ssh_test_host: "{{ ansible_host | default(inventory_hostname) }}"
    ssh_test_port: "{{ ansible_port | default(22) }}"
    ssh_test_user: "{{ ansible_user }}"
    ssh_test_key: "{{ ansible_ssh_private_key_file | default('') }}"
    ssh_test_timeout: 10

  pre_tasks:
    - name: Ensure SSH private key path is defined for this host
      ansible.builtin.assert:
        that:
          - ssh_test_key | length > 0
        fail_msg: "ansible_ssh_private_key_file is not defined for {{ inventory_hostname }}"
      delegate_to: localhost
      become: false

    - name: Verify key-based SSH login from control node
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_test_key }}"
          - -p
          - "{{ ssh_test_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - PasswordAuthentication=no
          - -o
          - KbdInteractiveAuthentication=no
          - -o
          - PreferredAuthentications=publickey
          - -o
          - StrictHostKeyChecking=no
          - -o
          - "ConnectTimeout={{ ssh_test_timeout }}"
          - "{{ ssh_test_user }}@{{ ssh_test_host }}"
          - "/bin/true"
      register: ssh_key_check
      changed_when: false
      failed_when: false
      delegate_to: localhost
      become: false

    - name: Show key-based SSH verification result
      ansible.builtin.debug:
        msg:
          - "inventory_hostname={{ inventory_hostname }}"
          - "ssh_test_target={{ ssh_test_user }}@{{ ssh_test_host }}:{{ ssh_test_port }}"
          - "key_login_rc={{ ssh_key_check.rc }}"
          - "key_login_stderr={{ ssh_key_check.stderr | default('') }}"

    - name: Skip this host if key-based SSH login is not verified
      ansible.builtin.meta: end_host
      when: ssh_key_check.rc != 0

  tasks:
    - name: Set PasswordAuthentication to no
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^(#\s*)?PasswordAuthentication\s+'
        line: 'PasswordAuthentication no'
        create: false
        backup: true
      notify: Reload SSH service

    - name: Ensure ChallengeResponseAuthentication is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^(#\s*)?ChallengeResponseAuthentication\s+'
        line: 'ChallengeResponseAuthentication no'
        create: false
        backup: true
      notify: Reload SSH service

    - name: Validate sshd configuration
      ansible.builtin.command: sshd -t
      changed_when: false

  handlers:
    - name: Reload SSH service
      ansible.builtin.service:
        name: "{{ os_ssh_service_name | default('ssh') }}"
        state: reloaded