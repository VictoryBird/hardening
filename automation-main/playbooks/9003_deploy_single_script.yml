---
- name: Deploy script to managed hosts
  hosts: env_lab
  gather_facts: false
  become: true

  vars:
    script_src: "{{ playbook_dir }}/../files/scripts/collect_info.sh"
    script_dest: "/opt/ansible/scripts/collect_info.sh"
    script_owner: "root"
    script_group: "root"
    script_mode: "0750"

  tasks:
    - name: Ensure script directory exists
      ansible.builtin.file:
        path: "{{ script_dest | dirname }}"
        state: directory
        owner: "{{ script_owner }}"
        group: "{{ script_group }}"
        mode: "0755"

    - name: Deploy script
      ansible.builtin.copy:
        src: "{{ script_src }}"
        dest: "{{ script_dest }}"
        owner: "{{ script_owner }}"
        group: "{{ script_group }}"
        mode: "{{ script_mode }}"
        backup: true

    - name: Show deployed script path
      ansible.builtin.debug:
        msg: "Deployed {{ script_dest }} to {{ inventory_hostname }}"
