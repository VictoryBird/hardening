---
# ═══════════════════════════════════════════════════════════════
# 서버 상태 수집 플레이북 (FAM 사전 훈련용)
# ═══════════════════════════════════════════════════════════════
# 사용법:
#   ansible-playbook playbook_discover.yml -i <inventory>
#
# 결과:
#   host_vars/<hostname>.yml 파일이 각 서버별로 생성됩니다.
#   생성된 파일을 검토한 후, 본훈련에서 playbook_harden.yml에 사용하세요.
# ═══════════════════════════════════════════════════════════════
- name: "FAM Discovery — Collect Server State"
  hosts: all
  become: yes
  gather_facts: yes
  any_errors_fatal: false

  vars:
    # 의심 포트 목록 (자동 필터링)
    suspicious_ports:
      - "4444"
      - "5555"
      - "6666"
      - "7777"
      - "8888"
      - "9999"
      - "1234"
      - "31337"
      - "12345"
      - "54321"

    # 보안 에이전트 정의
    known_agents:
      wazuh:
        processes: "wazuh-agentd wazuh-modulesd ossec-agentd"
        services: "wazuh-agent"
        ports: "1514/tcp 1515/tcp"
        accounts: "wazuh ossec"
      crowdstrike:
        processes: "falcon-sensor"
        services: "falcon-sensor"
        ports: ""
        accounts: ""
      velociraptor:
        processes: "velociraptor_client velociraptor"
        services: "velociraptor_client"
        ports: "8000/tcp"
        accounts: ""

  tasks:
    # ─── 1. 리스닝 포트 수집 ───
    - name: "Gather listening ports (Linux)"
      shell: ss -tlnp 2>/dev/null | awk 'NR>1 {print $4}' | grep -oE '[0-9]+$' | sort -un
      register: listening_ports_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "Gather listening ports (FreeBSD)"
      shell: sockstat -l -4 -6 2>/dev/null | awk 'NR>1 {print $6}' | grep -oE '[0-9]+$' | sort -un
      register: listening_ports_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "Gather listening ports (macOS)"
      shell: lsof -iTCP -sTCP:LISTEN -nP 2>/dev/null | awk 'NR>1 {print $9}' | grep -oE '[0-9]+$' | sort -un
      register: listening_ports_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "Filter suspicious ports and format"
      set_fact:
        discovered_ports_formatted: >-
          {{ listening_ports_raw.stdout_lines
             | default([])
             | difference(suspicious_ports)
             | map('regex_replace', '^(.+)$', '\1/tcp')
             | join(' ') }}

    - name: "Log discovered ports"
      debug:
        msg: "리스닝 포트: {{ discovered_ports_formatted }}"

    # ─── 2. 보안 에이전트 감지 ───
    - name: "Detect running security agents"
      shell: |
        agent_ports=""
        agent_services=""
        agent_accounts=""
        {% for agent_name, agent in known_agents.items() %}
        {% for proc in agent.processes.split() %}
        if pgrep -x "{{ proc }}" >/dev/null 2>&1; then
          {% if agent.ports %}
          agent_ports="{{ agent.ports }} ${agent_ports}"
          {% endif %}
          {% if agent.services %}
          agent_services="{{ agent.services }} ${agent_services}"
          {% endif %}
          {% if agent.accounts %}
          agent_accounts="{{ agent.accounts }} ${agent_accounts}"
          {% endif %}
        fi
        {% endfor %}
        {% endfor %}
        echo "PORTS:${agent_ports}"
        echo "SERVICES:${agent_services}"
        echo "ACCOUNTS:${agent_accounts}"
      register: agent_detection
      changed_when: false
      failed_when: false

    - name: "Parse agent detection results"
      set_fact:
        discovered_agent_ports: "{{ agent_detection.stdout_lines | select('match', '^PORTS:') | map('regex_replace', '^PORTS:', '') | first | default('') | trim }}"
        discovered_agent_services: "{{ agent_detection.stdout_lines | select('match', '^SERVICES:') | map('regex_replace', '^SERVICES:', '') | first | default('') | trim }}"
        discovered_agent_accounts: "{{ agent_detection.stdout_lines | select('match', '^ACCOUNTS:') | map('regex_replace', '^ACCOUNTS:', '') | first | default('') | trim }}"

    - name: "Log detected agents"
      debug:
        msg: "에이전트 — 포트: [{{ discovered_agent_ports }}], 서비스: [{{ discovered_agent_services }}], 계정: [{{ discovered_agent_accounts }}]"

    # ─── 3. IP 포워딩 감지 ───
    - name: "Check IP forwarding (Linux)"
      command: sysctl -n net.ipv4.ip_forward
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "Check IP forwarding (FreeBSD)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "Check IP forwarding (macOS)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "Set IP forwarding fact"
      set_fact:
        ip_forward_enabled: "{{ (ip_forward_check.stdout | default('0') | trim) == '1' }}"

    # ─── 4. SSH 키 존재 확인 ───
    - name: "Check SSH authorized_keys for connected user"
      stat:
        path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
      register: user_ssh_key

    - name: "Set SSH key fact"
      set_fact:
        no_ssh_key: "{{ not (user_ssh_key.stat.exists | default(false)) or (user_ssh_key.stat.size | default(0)) == 0 }}"

    # ─── 5. 실행 중인 서비스 수집 ───
    - name: "Collect running services (Linux)"
      shell: systemctl list-units --type=service --state=active --no-legend 2>/dev/null | awk '{print $1}' | sed 's/\.service$//' | sort
      register: running_services_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "Collect running services (FreeBSD)"
      shell: service -e 2>/dev/null | xargs -I{} basename {} | sort
      register: running_services_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "Collect running services (macOS)"
      shell: launchctl list 2>/dev/null | awk 'NR>1 {print $3}' | grep -v '^-$' | sort
      register: running_services_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "Build service list"
      set_fact:
        discovered_running_services: "{{ running_services_raw.stdout_lines | default([]) | join(' ') }}"

    # ─── 6. host_vars YAML 생성 ───
    - name: "Ensure host_vars directory exists"
      file:
        path: "{{ playbook_dir }}/host_vars"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: no
      run_once: true

    - name: "Generate host_vars file"
      copy:
        content: |
          ---
          # host_vars/{{ inventory_hostname }}.yml
          # 자동 생성: {{ ansible_date_time.iso8601 }}
          # 서버: {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }})
          #
          # 이 파일은 FAM에서 자동 수집된 서버 상태입니다.
          # 본훈련 전에 검토하고 필요시 수정하세요.

          # --- 방화벽 허용 포트 (현재 리스닝 중인 포트) ---
          discovered_allowed_ports: "{{ discovered_ports_formatted }}"

          # --- 보호 서비스 (에이전트 + 실행 중인 서비스) ---
          discovered_service_allowlist: "{{ discovered_agent_services }}"

          # --- 보호 계정 (에이전트 계정) ---
          discovered_account_allowlist: "{{ discovered_agent_accounts }}"

          # --- IP 포워딩 ---
          sysctl_disable_ip_forward: "{{ 'false' if ip_forward_enabled else 'true' }}"

          # --- SSH 인증 ---
          ssh_password_auth: "{{ 'yes' if no_ssh_key else 'no' }}"

          # --- 수동 추가 포트 (필요시 주석 해제) ---
          # extra_allowed_ports: ""

          # --- 수동 추가 보호 서비스 ---
          # extra_service_allowlist: ""

          # --- 수동 추가 보호 계정 ---
          # extra_account_allowlist: ""

          # --- 터널링 방어 비활성화 (필요시) ---
          # tunnel_defense_enabled: "false"
        dest: "{{ playbook_dir }}/host_vars/{{ inventory_hostname }}.yml"
      delegate_to: localhost
      become: no

    - name: "Report generated file"
      debug:
        msg: "host_vars/{{ inventory_hostname }}.yml 생성 완료 — 본훈련 전에 검토하세요."
