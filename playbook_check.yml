---
# ═══════════════════════════════════════════════════════════════
# 점검/복원 플레이북 (Playbook B)
# ═══════════════════════════════════════════════════════════════
# 사용법:
#   점검만:     ansible-playbook playbook_check.yml -i <inventory>
#   자동 복원:  ansible-playbook playbook_check.yml -i <inventory> -e "auto_restore=true"
# ═══════════════════════════════════════════════════════════════
- name: Hardening Check and Restore
  hosts: all
  become: yes
  any_errors_fatal: false
  vars:
    hardening_action: check
  tasks:
    - include_tasks: tasks/discover.yml
    - include_tasks: tasks/deploy.yml
    - include_tasks: tasks/execute.yml
