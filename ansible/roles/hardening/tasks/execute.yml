---
# ═══════════════════════════════════════════════════════════════
# 하드닝 실행
# ═══════════════════════════════════════════════════════════════

# --- 플레이북 A: 하드닝 ---
- name: "Run baseline hardening"
  command: bash {{ hardening_deploy_path }}/01_baseline_hardening.sh
  environment: "{{ hardening_environment }}"
  register: hardening_result
  failed_when: false
  when: hardening_action == "harden"

- name: "Show hardening result summary"
  debug:
    msg: "{{ hardening_result.stdout_lines[-5:] | default(['(no output)']) }}"
  when: hardening_action == "harden"

- name: "Warn on hardening failure"
  debug:
    msg: "WARNING: Hardening returned rc={{ hardening_result.rc }}. Check logs on {{ inventory_hostname }}"
  when: hardening_action == "harden" and (hardening_result.rc | default(0)) != 0

# --- 플레이북 B: 점검/복원 ---
- name: "Run check and restore"
  command: >-
    bash {{ hardening_deploy_path }}/02_check_and_restore.sh
    {{ '--auto-restore' if (auto_restore | bool) else '--check-only' }}
  environment: "{{ hardening_environment }}"
  register: check_result
  failed_when: false
  when: hardening_action == "check"

- name: "Show check result summary"
  debug:
    msg: "{{ check_result.stdout_lines[-5:] | default(['(no output)']) }}"
  when: hardening_action == "check"

- name: "Warn on check failure"
  debug:
    msg: "WARNING: Check returned rc={{ check_result.rc }}. Check logs on {{ inventory_hostname }}"
  when: hardening_action == "check" and (check_result.rc | default(0)) != 0

# --- 연결 확인 ---
- name: "Verify SSH connection is still alive"
  wait_for_connection:
    delay: 2
    timeout: 30
  when: hardening_action == "harden"

- name: "Post-hardening connection OK"
  debug:
    msg: "SSH connection verified after hardening on {{ inventory_hostname }}"
  when: hardening_action == "harden"
