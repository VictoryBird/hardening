---
# ═══════════════════════════════════════════════════════════════
# 4002 — 하드닝 적용 (Apply)
# ═══════════════════════════════════════════════════════════════
# 사용법:
#   # 수집 결과 파일을 변수로 전달
#   ansible-playbook playbooks/4002_hardening_apply.yml -i inventory \
#     -e "@artifacts/hardening_discover/web01.yml" --limit web01
#
#   # 또는 host_vars에 변수가 있으면 직접 실행
#   ansible-playbook playbooks/4002_hardening_apply.yml -i inventory
#
# 사전 조건:
#   - 보안 에이전트(Wazuh, CrowdStrike, Velociraptor) 설치 완료
#   - 대상 서버에 sudo 권한이 있는 계정으로 SSH 접속 가능
# ═══════════════════════════════════════════════════════════════
- name: "4002 — Hardening Apply"
  hosts: all
  become: yes
  gather_facts: yes
  any_errors_fatal: false

  vars:
    # 스크립트 소스 경로
    hardening_script_src: "{{ playbook_dir }}/../files/scripts/hardening"

    # 대상 서버 배포 경로
    hardening_deploy_path: /opt/hardening

    # 보안 에이전트 정의
    known_agents:
      wazuh:
        processes: "wazuh-agentd wazuh-modulesd ossec-agentd"
        services: "wazuh-agent"
        ports: "1514/tcp 1515/tcp"
        accounts: "wazuh ossec"
      crowdstrike:
        processes: "falcon-sensor"
        services: "falcon-sensor"
        ports: ""
        accounts: ""
      velociraptor:
        processes: "velociraptor_client velociraptor"
        services: "velociraptor_client"
        ports: "8000/tcp"
        accounts: ""

  tasks:
    # --- 0단계: discover 아티팩트 자동 로드 ---
    - name: "Discover 아티팩트 로드 (있으면)"
      include_vars:
        file: "{{ playbook_dir }}/../artifacts/hardening_discover/{{ inventory_hostname }}.yml"
      ignore_errors: true

    # ═══════════════════════════════════════════════════════════
    # 1단계: 런타임 감지
    # ═══════════════════════════════════════════════════════════

    # --- Ansible 접속 계정 감지 ---
    - name: "Ansible 접속 계정 감지"
      set_fact:
        detected_ansible_account: "{{ ansible_user | default(ansible_env.USER) | default('root') }}"

    - name: "접속 계정 로그"
      debug:
        msg: "Ansible account: {{ detected_ansible_account }}"

    # --- 보안 에이전트 런타임 감지 (적용 시점 기준) ---
    - name: "보안 에이전트 런타임 감지"
      shell: |
        agent_ports=""
        agent_services=""
        agent_accounts=""
        {% for agent_name, agent in known_agents.items() %}
        {% for proc in agent.processes.split() %}
        if pgrep -x "{{ proc }}" >/dev/null 2>&1; then
          {% if agent.ports %}
          agent_ports="{{ agent.ports }} ${agent_ports}"
          {% endif %}
          {% if agent.services %}
          agent_services="{{ agent.services }} ${agent_services}"
          {% endif %}
          {% if agent.accounts %}
          agent_accounts="{{ agent.accounts }} ${agent_accounts}"
          {% endif %}
        fi
        {% endfor %}
        {% endfor %}
        echo "PORTS:${agent_ports}"
        echo "SERVICES:${agent_services}"
        echo "ACCOUNTS:${agent_accounts}"
      register: agent_detection
      changed_when: false
      failed_when: false

    - name: "에이전트 감지 결과 파싱"
      set_fact:
        detected_agent_ports: "{{ agent_detection.stdout_lines | select('match', '^PORTS:') | map('regex_replace', '^PORTS:', '') | first | default('') | trim }}"
        detected_agent_services: "{{ agent_detection.stdout_lines | select('match', '^SERVICES:') | map('regex_replace', '^SERVICES:', '') | first | default('') | trim }}"
        detected_agent_accounts: "{{ agent_detection.stdout_lines | select('match', '^ACCOUNTS:') | map('regex_replace', '^ACCOUNTS:', '') | first | default('') | trim }}"

    # --- IP 포워딩 감지 ---
    - name: "IP 포워딩 확인 (Linux)"
      command: sysctl -n net.ipv4.ip_forward
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "IP 포워딩 확인 (FreeBSD)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "IP 포워딩 확인 (macOS)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "IP 포워딩 설정값 결정"
      set_fact:
        final_ip_forward: >-
          {%- if hardening_ip_forward is defined -%}
            {{ 'false' if (hardening_ip_forward | string) in ['true', 'True', '1'] else 'true' }}
          {%- else -%}
            {{ 'false' if (ip_forward_check.stdout | default('0') | trim) == '1' else 'true' }}
          {%- endif -%}

    # --- SSH 키 확인 ---
    - name: "SSH authorized_keys 확인"
      stat:
        path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
      register: ansible_user_ssh_key

    - name: "SSH 패스워드 인증 결정"
      set_fact:
        final_ssh_pw_auth: >-
          {%- if hardening_ssh_password_auth is defined -%}{{ hardening_ssh_password_auth }}
          {%- elif not (ansible_user_ssh_key.stat.exists | default(false)) or (ansible_user_ssh_key.stat.size | default(0)) == 0 -%}yes
          {%- else -%}no{%- endif -%}

    # ═══════════════════════════════════════════════════════════
    # 2단계: environment 조합
    # ═══════════════════════════════════════════════════════════

    - name: "허용 포트 조합"
      set_fact:
        final_allowed_ports: "{{ ((hardening_allowed_ports | default('')) + ' ' + (hardening_extra_ports | default('')) + ' ' + detected_agent_ports) | trim }}"

    - name: "서비스 허용목록 조합"
      set_fact:
        final_service_allowlist: "{{ ((hardening_service_allowlist | default('')) + ' ' + (hardening_extra_services | default('')) + ' ' + detected_agent_services) | trim }}"

    - name: "계정 허용목록 조합"
      set_fact:
        final_account_allowlist: "{{ ((hardening_account_allowlist | default('')) + ' ' + (hardening_extra_accounts | default('')) + ' ' + detected_agent_accounts) | trim }}"

    - name: "하드닝 environment 조립"
      set_fact:
        hardening_environment:
          HARDENING_PROFILE: "custom"
          CUSTOM_ALLOWED_PORTS: "{{ final_allowed_ports }}"
          SSH_PASSWORD_AUTH: "{{ final_ssh_pw_auth | trim }}"
          SYSCTL_DISABLE_IP_FORWARD: "{{ final_ip_forward | trim }}"
          SERVICE_ALLOWLIST: "{{ final_service_allowlist }}"
          ACCOUNT_ALLOWLIST: "{{ final_account_allowlist }}"
          PROTECTED_ACCOUNTS: "gt {{ detected_ansible_account }}"
          SSH_PERMIT_ROOT_LOGIN: "{{ hardening_ssh_permit_root_login | default('') }}"
          DISABLE_SERVICES: "{{ hardening_disable_services | default('') }}"

    - name: "최종 environment 로그"
      debug:
        msg: "{{ hardening_environment }}"

    # ═══════════════════════════════════════════════════════════
    # 3단계: 스크립트 배포
    # ═══════════════════════════════════════════════════════════

    - name: "하드닝 디렉토리 생성"
      file:
        path: "{{ hardening_deploy_path }}"
        state: directory
        mode: '0750'
        owner: root
        group: "{{ 'wheel' if ansible_system in ['FreeBSD', 'Darwin'] else 'root' }}"

    - name: "하드닝 스크립트 배포"
      copy:
        src: "{{ hardening_script_src }}/"
        dest: "{{ hardening_deploy_path }}/"
        mode: preserve
        owner: root

    - name: "메인 스크립트 실행 권한 설정"
      file:
        path: "{{ hardening_deploy_path }}/{{ item }}"
        mode: '0750'
      loop:
        - 01_baseline_hardening.sh
        - 02_check_and_restore.sh

    # ═══════════════════════════════════════════════════════════
    # 4단계: 하드닝 실행
    # ═══════════════════════════════════════════════════════════

    - name: "베이스라인 하드닝 실행"
      command: bash {{ hardening_deploy_path }}/01_baseline_hardening.sh
      environment: "{{ hardening_environment }}"
      register: hardening_async
      failed_when: false
      async: 600
      poll: 0

    - name: "하드닝 완료 대기"
      async_status:
        jid: "{{ hardening_async.ansible_job_id }}"
      register: hardening_result
      until: hardening_result.finished
      retries: 60
      delay: 10
      failed_when: false

    - name: "하드닝 결과 요약"
      shell: "ls -t /var/log/hardening/*_baseline_hardening.log 2>/dev/null | head -1 | xargs tail -10 2>/dev/null || echo '(로그 없음)'"
      register: hardening_log_tail
      changed_when: false
      become: true

    - name: "하드닝 로그"
      debug:
        msg: "{{ hardening_log_tail.stdout_lines | default(['(출력 없음)']) }}"

    - name: "하드닝 실패 경고"
      debug:
        msg: "WARNING: 하드닝 rc={{ hardening_result.rc | default('unknown') }}. {{ inventory_hostname }} 로그를 확인하세요."
      when: (hardening_result.rc | default(0)) != 0

    # ═══════════════════════════════════════════════════════════
    # 5단계: SSH 연결 확인
    # ═══════════════════════════════════════════════════════════

    - name: "SSH 연결 확인 (하드닝 후)"
      wait_for_connection:
        delay: 2
        timeout: 30

    - name: "연결 확인 완료"
      debug:
        msg: "SSH 연결 확인 완료: {{ inventory_hostname }}"

    # ═══════════════════════════════════════════════════════════
    # 6단계: 비보호 계정 SSH 세션 종료
    # ═══════════════════════════════════════════════════════════
    - name: "비보호 계정 SSH 세션 종료"
      shell: |
        protected="{{ hardening_environment.PROTECTED_ACCOUNTS | default('') }}"
        killed=0
        # Get all sshd child processes (user sessions), skip master sshd
        for pid in $(pgrep -f 'sshd.*:.*@' 2>/dev/null); do
          user=$(ps -o user= -p "$pid" 2>/dev/null | tr -d ' ')
          [ -z "$user" ] && continue
          # Check if user is protected
          skip=0
          for pa in $protected; do
            [ "$user" = "$pa" ] && skip=1 && break
          done
          if [ "$skip" -eq 0 ]; then
            kill "$pid" 2>/dev/null && killed=$((killed + 1)) && echo "Killed: $user (PID $pid)"
          fi
        done
        echo "Total killed: $killed"
      register: kill_sessions_result
      changed_when: "'Killed:' in kill_sessions_result.stdout"
      failed_when: false

    - name: "세션 종료 결과"
      debug:
        msg: "{{ kill_sessions_result.stdout_lines | default(['없음']) }}"
      when: kill_sessions_result.stdout | default('') | length > 0
