---
# ═══════════════════════════════════════════════════════════════
# 4001 — 하드닝 사전 수집 (Discovery)
# ═══════════════════════════════════════════════════════════════
# 사용법:
#   ansible-playbook playbooks/4001_hardening_discover.yml -i inventory
#
# 결과:
#   artifacts/hardening_discover/<hostname>.yml 파일이 각 서버별로 생성됩니다.
#   생성된 파일을 검토한 후, 4002_hardening_apply.yml에 -e "@file" 로 전달하세요.
# ═══════════════════════════════════════════════════════════════

# ─── Play 1: 원격 서버 정보 수집 ───
- name: "4001 — Hardening Discovery (수집)"
  hosts: all
  become: yes
  gather_facts: yes
  any_errors_fatal: false

  vars:
    # 의심 포트 목록 (자동 필터링)
    suspicious_ports:
      - "4444"
      - "5555"
      - "6666"
      - "7777"
      - "8888"
      - "9999"
      - "1234"
      - "31337"
      - "12345"
      - "54321"

    # 보안 에이전트 정의
    known_agents:
      wazuh:
        processes: "wazuh-agentd wazuh-modulesd ossec-agentd"
        services: "wazuh-agent"
        ports: "1514/tcp 1515/tcp"
        accounts: "wazuh ossec"
      crowdstrike:
        processes: "falcon-sensor"
        services: "falcon-sensor"
        ports: ""
        accounts: ""
      velociraptor:
        processes: "velociraptor_client velociraptor"
        services: "velociraptor_client"
        ports: "8000/tcp"
        accounts: ""

  tasks:
    # ─── 1. 리스닝 포트 수집 ───
    - name: "리스닝 포트 수집 (Linux)"
      shell: ss -tln 2>/dev/null | awk 'NR>1 {n=split($4,a,":"); print a[n]}' | sort -un
      register: listening_ports_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "리스닝 포트 수집 (FreeBSD)"
      shell: sockstat -l -4 -6 2>/dev/null | awk 'NR>1 {n=split($6,a,":"); print a[n]}' | sort -un
      register: listening_ports_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "리스닝 포트 수집 (macOS)"
      shell: lsof -iTCP -sTCP:LISTEN -nP 2>/dev/null | awk 'NR>1 {n=split($9,a,":"); print a[n]}' | sort -un
      register: listening_ports_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "의심 포트 필터링 및 포맷"
      set_fact:
        discovered_ports_formatted: >-
          {{ listening_ports_raw.stdout_lines
             | default([])
             | difference(suspicious_ports)
             | map('regex_replace', '^(.+)$', '\1/tcp')
             | join(' ') }}

    - name: "수집된 포트 로그"
      debug:
        msg: "리스닝 포트: {{ discovered_ports_formatted }}"

    # ─── 2. 보안 에이전트 감지 ───
    - name: "보안 에이전트 감지"
      shell: |
        agent_ports=""
        agent_services=""
        agent_accounts=""
        {% for agent_name, agent in known_agents.items() %}
        {% for proc in agent.processes.split() %}
        if pgrep -x "{{ proc }}" >/dev/null 2>&1; then
          {% if agent.ports %}
          agent_ports="{{ agent.ports }} ${agent_ports}"
          {% endif %}
          {% if agent.services %}
          agent_services="{{ agent.services }} ${agent_services}"
          {% endif %}
          {% if agent.accounts %}
          agent_accounts="{{ agent.accounts }} ${agent_accounts}"
          {% endif %}
        fi
        {% endfor %}
        {% endfor %}
        echo "PORTS:${agent_ports}"
        echo "SERVICES:${agent_services}"
        echo "ACCOUNTS:${agent_accounts}"
      register: agent_detection
      changed_when: false
      failed_when: false

    - name: "에이전트 감지 결과 파싱"
      set_fact:
        discovered_agent_ports: "{{ agent_detection.stdout_lines | select('match', '^PORTS:') | map('regex_replace', '^PORTS:', '') | first | default('') | trim }}"
        discovered_agent_services: "{{ agent_detection.stdout_lines | select('match', '^SERVICES:') | map('regex_replace', '^SERVICES:', '') | first | default('') | trim }}"
        discovered_agent_accounts: "{{ agent_detection.stdout_lines | select('match', '^ACCOUNTS:') | map('regex_replace', '^ACCOUNTS:', '') | first | default('') | trim }}"

    - name: "감지된 에이전트 로그"
      debug:
        msg: "에이전트 — 포트: [{{ discovered_agent_ports }}], 서비스: [{{ discovered_agent_services }}], 계정: [{{ discovered_agent_accounts }}]"

    # ─── 3. IP 포워딩 감지 ───
    - name: "IP 포워딩 확인 (Linux)"
      command: sysctl -n net.ipv4.ip_forward
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "IP 포워딩 확인 (FreeBSD)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "IP 포워딩 확인 (macOS)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "IP 포워딩 상태 설정"
      set_fact:
        ip_forward_enabled: "{{ (ip_forward_check.stdout | default('0') | trim) == '1' }}"

    # ─── 4. SSH 키 존재 확인 ───
    - name: "SSH authorized_keys 확인"
      stat:
        path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
      register: user_ssh_key

    - name: "SSH 키 상태 설정"
      set_fact:
        no_ssh_key: "{{ not (user_ssh_key.stat.exists | default(false)) or (user_ssh_key.stat.size | default(0)) == 0 }}"

    # ─── 5. 실행 중인 서비스 수집 ───
    - name: "실행 서비스 수집 (Linux)"
      shell: systemctl list-units --type=service --state=active --no-legend 2>/dev/null | awk '{print $1}' | sed 's/\.service$//' | sort
      register: running_services_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "실행 서비스 수집 (FreeBSD)"
      shell: service -e 2>/dev/null | xargs -I{} basename {} | sort
      register: running_services_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "실행 서비스 수집 (macOS)"
      shell: launchctl list 2>/dev/null | awk 'NR>1 {print $3}' | grep -v '^-$' | sort
      register: running_services_raw
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "서비스 목록 조합"
      set_fact:
        discovered_running_services: "{{ running_services_raw.stdout_lines | default([]) | join(' ') }}"

    # ─── 6. 포트 합산 (수집 포트 + 에이전트 포트) ───
    - name: "전체 허용 포트 조합"
      set_fact:
        all_allowed_ports: "{{ (discovered_ports_formatted + ' ' + discovered_agent_ports) | trim }}"

    - name: "전체 서비스 허용목록 조합"
      set_fact:
        all_service_allowlist: "{{ (discovered_agent_services + ' ' + discovered_running_services) | trim }}"

# ─── Play 2: 로컬 아티팩트 생성 (delegate_to 사용 안 함 — inventory ansible_become 회피) ───
- name: "4001 — Hardening Discovery (아티팩트 생성)"
  hosts: localhost
  connection: local
  gather_facts: no
  any_errors_fatal: false

  vars:
    artifact_dir: "{{ playbook_dir }}/../artifacts/hardening_discover"
    target_hosts: "{{ groups['all'] | difference(['localhost']) }}"

  tasks:
    - name: "아티팩트 디렉토리 생성"
      file:
        path: "{{ artifact_dir }}"
        state: directory
        mode: "0755"

    - name: "호스트별 아티팩트 YAML 생성"
      copy:
        content: |
          ---
          # 자동 수집: {{ hostvars[item].ansible_date_time.iso8601 }}
          # 서버: {{ item }} ({{ hostvars[item].ansible_distribution }} {{ hostvars[item].ansible_distribution_version }})
          # 이 파일의 내용을 확인한 후, 필요시 수정하여
          # inventories/lab/host_vars/{{ item }}.yml 에 하드닝 변수를 추가하세요.
          #
          # 또는 이 파일을 그대로 4002_hardening_apply.yml 에 전달할 수 있습니다:
          #   ansible-playbook 4002_hardening_apply.yml -i inventory -e "@artifacts/hardening_discover/{{ item }}.yml" --limit {{ item }}

          # --- 방화벽 허용 포트 ---
          hardening_allowed_ports: "{{ hostvars[item].all_allowed_ports }}"

          # --- 보호 서비스 허용목록 ---
          hardening_service_allowlist: "{{ hostvars[item].discovered_agent_services }}"

          # --- 보호 계정 허용목록 ---
          hardening_account_allowlist: "{{ hostvars[item].discovered_agent_accounts }}"

          # --- IP 포워딩 (true=현재 활성화, false=비활성화) ---
          hardening_ip_forward: "{{ hostvars[item].ip_forward_enabled }}"

          # --- SSH 패스워드 인증 ---
          hardening_ssh_password_auth: "{{ 'yes' if hostvars[item].no_ssh_key else 'no' }}"

          # --- 추가 설정 (필요시 주석 해제) ---
          # hardening_extra_ports: ""
          # hardening_extra_services: ""
          # hardening_extra_accounts: ""
          # hardening_ssh_permit_root_login: "no"
          # hardening_tunnel_defense_enabled: "true"
          # hardening_disable_services: ""
        dest: "{{ artifact_dir }}/{{ item }}.yml"
      loop: "{{ target_hosts }}"

    - name: "수집 완료 보고"
      debug:
        msg: "{{ target_hosts | length }}개 호스트 아티팩트 생성 완료 — artifacts/hardening_discover/ 확인하세요."
