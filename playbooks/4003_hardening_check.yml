---
# ═══════════════════════════════════════════════════════════════
# 4003 — 하드닝 점검/복원 (Check & Restore)
# ═══════════════════════════════════════════════════════════════
# 사용법:
#   # 점검만 (기본) — 대상 서버의 베이스라인 스냅샷과 현재 상태를 비교합니다
#   ansible-playbook playbooks/4003_hardening_check.yml -i inventory
#
#   # 자동 복원
#   ansible-playbook playbooks/4003_hardening_check.yml -i inventory \
#     -e "auto_restore=true"
#
# 참고:
#   4003은 4002가 생성한 /var/lib/hardening/baseline/ 스냅샷만 사용합니다.
#   discover 아티팩트를 다시 로드하지 않습니다.
# ═══════════════════════════════════════════════════════════════
- name: "4003 — Hardening Check & Restore"
  hosts: all
  become: yes
  gather_facts: yes
  any_errors_fatal: false

  vars:
    # 스크립트 소스 경로
    hardening_script_src: "{{ playbook_dir }}/../files/scripts/hardening"

    # 대상 서버 배포 경로
    hardening_deploy_path: /opt/hardening

    # 자동 복원 모드 (기본: 점검만)
    auto_restore: false

  tasks:
    # ═══════════════════════════════════════════════════════════
    # 1단계: 스크립트 배포
    # ═══════════════════════════════════════════════════════════

    - name: "하드닝 디렉토리 생성"
      file:
        path: "{{ hardening_deploy_path }}"
        state: directory
        mode: '0750'
        owner: root
        group: "{{ 'wheel' if ansible_system in ['FreeBSD', 'Darwin'] else 'root' }}"

    - name: "하드닝 스크립트 배포"
      copy:
        src: "{{ hardening_script_src }}/"
        dest: "{{ hardening_deploy_path }}/"
        mode: preserve
        owner: root

    - name: "메인 스크립트 실행 권한 설정"
      file:
        path: "{{ hardening_deploy_path }}/{{ item }}"
        mode: '0750'
      loop:
        - 01_baseline_hardening.sh
        - 02_check_and_restore.sh

    # ═══════════════════════════════════════════════════════════
    # 2단계: 점검/복원 실행 (베이스라인 스냅샷 기반)
    # ═══════════════════════════════════════════════════════════

    - name: "점검/복원 실행"
      command: >-
        bash {{ hardening_deploy_path }}/02_check_and_restore.sh
        {{ '--auto-restore' if (auto_restore | bool) else '--check-only' }}
      register: check_async
      failed_when: false
      async: 600
      poll: 0

    - name: "점검 완료 대기"
      async_status:
        jid: "{{ check_async.ansible_job_id }}"
      register: check_result
      until: check_result.finished
      retries: 60
      delay: 10
      failed_when: false

    - name: "점검 결과 요약"
      shell: "ls -t /var/log/hardening/*_check_result.log 2>/dev/null | head -1 | xargs tail -10 2>/dev/null || echo '(로그 없음)'"
      register: check_log_tail
      changed_when: false
      become: true

    - name: "점검 로그"
      debug:
        msg: "{{ check_log_tail.stdout_lines | default(['(출력 없음)']) }}"

    - name: "점검 실패 경고"
      debug:
        msg: "WARNING: 점검 rc={{ check_result.rc | default('unknown') }}. {{ inventory_hostname }} 로그를 확인하세요."
      when: (check_result.rc | default(0)) != 0
