---
# ═══════════════════════════════════════════════════════════════
# 4003 — 하드닝 점검/복원 (Check & Restore)
# ═══════════════════════════════════════════════════════════════
# 사용법:
#   # 점검만 (기본) — discover 아티팩트는 자동 로드됩니다
#   ansible-playbook playbooks/4003_hardening_check.yml -i inventory
#
#   # 자동 복원
#   ansible-playbook playbooks/4003_hardening_check.yml -i inventory \
#     -e "auto_restore=true"
# ═══════════════════════════════════════════════════════════════
- name: "4003 — Hardening Check & Restore"
  hosts: all
  become: yes
  gather_facts: yes
  any_errors_fatal: false

  vars:
    # 스크립트 소스 경로
    hardening_script_src: "{{ playbook_dir }}/../files/scripts/hardening"

    # 대상 서버 배포 경로
    hardening_deploy_path: /opt/hardening

    # 자동 복원 모드 (기본: 점검만)
    auto_restore: false

  tasks:
    # --- 0단계: discover 아티팩트 자동 로드 ---
    - name: "Discover 아티팩트 로드 (있으면)"
      include_vars:
        file: "{{ playbook_dir }}/../artifacts/hardening_discover/{{ inventory_hostname }}.yml"
      ignore_errors: true

    # ═══════════════════════════════════════════════════════════
    # 1단계: 런타임 감지
    # ═══════════════════════════════════════════════════════════

    # --- IP 포워딩 감지 ---
    - name: "IP 포워딩 확인 (Linux)"
      command: sysctl -n net.ipv4.ip_forward
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Linux"

    - name: "IP 포워딩 확인 (FreeBSD)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "FreeBSD"

    - name: "IP 포워딩 확인 (macOS)"
      command: sysctl -n net.inet.ip.forwarding
      register: ip_forward_check
      changed_when: false
      failed_when: false
      when: ansible_system == "Darwin"

    - name: "IP 포워딩 설정값 결정"
      set_fact:
        final_ip_forward: >-
          {%- if hardening_ip_forward is defined -%}
            {{ 'false' if (hardening_ip_forward | string) in ['true', 'True', '1'] else 'true' }}
          {%- else -%}
            {{ 'false' if (ip_forward_check.stdout | default('0') | trim) == '1' else 'true' }}
          {%- endif -%}

    # --- SSH 키 확인 ---
    - name: "SSH authorized_keys 확인"
      stat:
        path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
      register: ansible_user_ssh_key

    - name: "SSH 패스워드 인증 결정"
      set_fact:
        final_ssh_pw_auth: >-
          {%- if hardening_ssh_password_auth is defined -%}{{ hardening_ssh_password_auth }}
          {%- elif not (ansible_user_ssh_key.stat.exists | default(false)) or (ansible_user_ssh_key.stat.size | default(0)) == 0 -%}yes
          {%- else -%}no{%- endif -%}

    # ═══════════════════════════════════════════════════════════
    # 2단계: environment 조합
    # ═══════════════════════════════════════════════════════════

    - name: "하드닝 environment 조립"
      set_fact:
        hardening_environment:
          HARDENING_PROFILE: "custom"
          CUSTOM_ALLOWED_PORTS: "{{ hardening_allowed_ports | default('') }}"
          SSH_PASSWORD_AUTH: "{{ final_ssh_pw_auth | trim }}"
          SYSCTL_DISABLE_IP_FORWARD: "{{ final_ip_forward | trim }}"
          SERVICE_ALLOWLIST: "{{ hardening_service_allowlist | default('') }}"
          ACCOUNT_ALLOWLIST: "{{ hardening_account_allowlist | default('') }}"
          SSH_PERMIT_ROOT_LOGIN: "{{ hardening_ssh_permit_root_login | default('') }}"
          DISABLE_SERVICES: "{{ hardening_disable_services | default('') }}"

    # ═══════════════════════════════════════════════════════════
    # 3단계: 스크립트 배포
    # ═══════════════════════════════════════════════════════════

    - name: "하드닝 디렉토리 생성"
      file:
        path: "{{ hardening_deploy_path }}"
        state: directory
        mode: '0750'
        owner: root
        group: "{{ 'wheel' if ansible_system in ['FreeBSD', 'Darwin'] else 'root' }}"

    - name: "하드닝 스크립트 배포"
      copy:
        src: "{{ hardening_script_src }}/"
        dest: "{{ hardening_deploy_path }}/"
        mode: preserve
        owner: root

    - name: "메인 스크립트 실행 권한 설정"
      file:
        path: "{{ hardening_deploy_path }}/{{ item }}"
        mode: '0750'
      loop:
        - 01_baseline_hardening.sh
        - 02_check_and_restore.sh

    # ═══════════════════════════════════════════════════════════
    # 4단계: 점검/복원 실행
    # ═══════════════════════════════════════════════════════════

    - name: "점검/복원 실행"
      command: >-
        bash {{ hardening_deploy_path }}/02_check_and_restore.sh
        {{ '--auto-restore' if (auto_restore | bool) else '--check-only' }}
      environment: "{{ hardening_environment }}"
      register: check_async
      failed_when: false
      async: 600
      poll: 0

    - name: "점검 완료 대기"
      async_status:
        jid: "{{ check_async.ansible_job_id }}"
      register: check_result
      until: check_result.finished
      retries: 60
      delay: 10
      failed_when: false

    - name: "점검 결과 요약"
      shell: "ls -t /var/log/hardening/*_check_result.log 2>/dev/null | head -1 | xargs tail -10 2>/dev/null || echo '(로그 없음)'"
      register: check_log_tail
      changed_when: false
      become: true

    - name: "점검 로그"
      debug:
        msg: "{{ check_log_tail.stdout_lines | default(['(출력 없음)']) }}"

    - name: "점검 실패 경고"
      debug:
        msg: "WARNING: 점검 rc={{ check_result.rc | default('unknown') }}. {{ inventory_hostname }} 로그를 확인하세요."
      when: (check_result.rc | default(0)) != 0
